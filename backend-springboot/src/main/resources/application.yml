spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventory}
    username: ${DB_USERNAME:inventory_app}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Async thread pool for anomaly detection calls
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100

app:
  jwt:
    secret: ${JWT_SECRET:changeme_jwt_secret_minimum_256_bits_long_placeholder_value}
    expiry-ms: ${JWT_EXPIRY_MS:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout-ms: ${AI_SERVICE_TIMEOUT_MS:2000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.warehouse: INFO
    org.springframework.security: WARN
